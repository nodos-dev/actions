name: Modules

on:
  workflow_call:
    secrets:
      CI_TOKEN:
        required: true
      NODOS_STORE_ACCESS_TOKEN:
        required: true
        description: 'Access token for Nodos Store authentication (publishing)'
    inputs:
      ref_name:
        required: true
        type: string
      publish_mode:
        type: string
        description: 'Publish Mode. Options: If Changed, Force, None'
        default: 'None'
      package_names:
        description: 'Publish only these packages (semicolon-delimited). If empty, all discovered packages are published.'
        required: false
        default: ''
        type: string
      nodos_sdk_version:
        description: 'Legacy Nodos version (nosman get --version)'
        required: false
        default: ''
        type: string
      clean:
        description: 'Clean build'
        required: false
        default: false
        type: boolean
      build_number:
        description: 'Build number'
        required: false
        default: '0'
        type: string
      pre_config_command:
        description: 'Execute a command before configuration steps'
        required: false
        default: ''
        type: string
      linux:
        description: 'Release for Linux'
        required: false
        default: true
        type: boolean
      windows:
        description: 'Release for Windows'
        required: false
        default: true
        type: boolean

jobs:
  prepare-strategy:
    name: Prepare Strategy
    runs-on: self-hosted
    outputs:
      runner-list: ${{ steps.prepare-step.outputs.runner-list }}
      safe-ref: ${{ steps.prepare-step.outputs.safe-ref }}
    steps:
      - name: Prepare Runner List
        id: prepare-step
        shell: bash
        env:
          REF_NAME: ${{ inputs.ref_name }}
        run: |
          runner_list=$(python3 -c "$(curl -fsSL https://raw.githubusercontent.com/nodos-dev/actions/refs/heads/main/scripts/prep_runner_list.py)" \
            --workflow-input-linux ${{ inputs.linux }} \
            --workflow-input-windows ${{ inputs.windows }} \
            --ref-name "$REF_NAME" \
            --event-name "workflow_call")
          echo Runners: $runner_list
          echo "runner-list=$runner_list" >> $GITHUB_OUTPUT
          # Branch names may contain slashes; sanitize for use in paths and tags.
          echo "safe-ref=${REF_NAME//\//-}" >> $GITHUB_OUTPUT

  build:
    strategy:
      matrix:
        runner: ${{ fromJson(needs.prepare-strategy.outputs.runner-list) }}
      fail-fast: false
    name: "${{ inputs.ref_name }} - ${{ inputs.build_number }} (${{ matrix.runner[0] }}) ${{ (inputs.publish_mode != 'None' && ' (Publishing)') || '' }} ${{ (inputs.publish_mode == 'None' && ' (Build Only)') || '' }}"
    needs: prepare-strategy
    runs-on: ${{ matrix.runner }}

    env:
      GH_USERNAME: "nodos-bot"
      GIT_EMAIL: "bot@nodos.dev"
      GH_TOKEN: ${{ secrets.CI_TOKEN }}
      NODOS_STORE_ACCESS_TOKEN: ${{ secrets.NODOS_STORE_ACCESS_TOKEN }}
      RUST_BACKTRACE: 1
      SAFE_REF: ${{ needs.prepare-strategy.outputs.safe-ref }}

    steps:
      - name: Setup Environment Variables
        run: |
          if [ "${{ matrix.runner[0] }}" == "Linux" ]; then
            echo "SYSTEM_NOSMAN_PATH=~/Tools/nodos/nodos" >> $GITHUB_ENV
            echo "NOSMAN_EXECUTABLE_NAME=nodos" >> $GITHUB_ENV
            echo "TAG_NAME_PREFIX=build.${SAFE_REF}-linux" >> $GITHUB_ENV
          else
            echo "SYSTEM_NOSMAN_PATH=C:/Tools/nodos.exe" >> $GITHUB_ENV
            echo "NOSMAN_EXECUTABLE_NAME=nodos.exe" >> $GITHUB_ENV
            echo "TAG_NAME_PREFIX=build.${SAFE_REF}-windows" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Update Git Credentials
        continue-on-error: true
        shell: bash
        run: |
          git credential-manager github login --username ${{ env.GH_USERNAME }} --token ${{ secrets.CI_TOKEN }} --force

      - name: Clean
        shell: pwsh
        if: ${{ inputs.clean }}
        run: |
          if (Test-Path -Path ./packages-${{ env.SAFE_REF }}) { Remove-Item -Path ./packages-${{ env.SAFE_REF }} -Recurse -Force }

      - name: Setup Work Folder
        shell: pwsh
        run: |
          if (-not (Test-Path -Path ./packages-${{ env.SAFE_REF }})) { New-Item -Path ./packages-${{ env.SAFE_REF }} -ItemType Directory -Force }

      - name: Ensure Nosman
        run: |
          $ErrorActionPreference = 'Stop'
          $nosmanPath = "${{ env.SYSTEM_NOSMAN_PATH }}"
          $nosmanDir = Split-Path -Parent $nosmanPath
          if (-not (Test-Path -Path $nosmanDir)) { New-Item -Path $nosmanDir -ItemType Directory -Force | Out-Null }

          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/nodos-dev/workspace/releases/latest" -Headers @{ "User-Agent" = "nodos-ci" }
          if (-not $release.tag_name) { throw "Latest release tag not found." }
          $latestVersion = $release.tag_name
          if ($latestVersion -match "(\d+\.\d+\.\d+)") { $latestVersion = $Matches[1] }

          $currentVersion = $null
          if (Test-Path -Path $nosmanPath) {
            $versionOutput = & $nosmanPath --version 2>$null
            if ($versionOutput -match "(\d+\.\d+\.\d+)") { $currentVersion = $Matches[1] }
          }

          function Compare-SemVer([string]$a, [string]$b) {
            $aParts = $a.Split('.')
            $bParts = $b.Split('.')
            for ($i = 0; $i -lt 3; $i++) {
              $aVal = [int]($aParts[$i] ?? 0)
              $bVal = [int]($bParts[$i] ?? 0)
              if ($aVal -lt $bVal) { return -1 }
              if ($aVal -gt $bVal) { return 1 }
            }
            return 0
          }

          $needsUpdate = $true
          if ($currentVersion) {
            if ((Compare-SemVer $currentVersion $latestVersion) -ge 0) { $needsUpdate = $false }
          }

          if (-not $needsUpdate) {
            Write-Host "nosman is up to date ($currentVersion)."
            exit 0
          }

          $arch = [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture
          $archToken = switch ($arch) {
            ([System.Runtime.InteropServices.Architecture]::X64)   { "x86_64" }
            ([System.Runtime.InteropServices.Architecture]::Arm64) { "aarch64" }
            default { "" }
          }
          if ([string]::IsNullOrEmpty($archToken)) {
            throw "Unsupported architecture for nosman download: $arch"
          }

          $osToken = if ($IsWindows) { "windows" } else { "linux" }
          $assetName = "nosman-$osToken-$archToken"
          if ($IsWindows) { $assetName = "$assetName.exe" }
          $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            $available = ($release.assets | ForEach-Object { $_.name }) -join ", "
            throw "Asset $assetName not found in latest release. Available assets: $available"
          }
          Write-Host "Downloading $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $nosmanPath
          if (-not $IsWindows) { chmod +x $nosmanPath }
        shell: pwsh
        working-directory: packages-${{ env.SAFE_REF }}

      - name: Setup Nodos Workspace
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -Path ./workspace)) { New-Item -Path ./workspace -ItemType Directory -Force | Out-Null }
          $nosmanDestination = if ($IsWindows) { "nodos.exe" } else { "nodos" }
          $nosmanDestinationPath = Join-Path ./workspace $nosmanDestination
          Copy-Item -Path "${{ env.SYSTEM_NOSMAN_PATH }}" -Destination $nosmanDestinationPath -Force
          if (-not $IsWindows) { & chmod +x $nosmanDestinationPath }
          Push-Location ./workspace
          & ${{ env.SYSTEM_NOSMAN_PATH }} init --reinit
          if (-not (Test-Path -Path ./Module)) { New-Item -Path ./Module -ItemType Directory -Force | Out-Null }
          Pop-Location
        shell: pwsh
        working-directory: packages-${{ env.SAFE_REF }}

      - name: Setup Nodos Workspace (Legacy)
        if: ${{ inputs.nodos_sdk_version != '' }}
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location ./workspace
          ./${{ env.NOSMAN_EXECUTABLE_NAME }} get --version "${{ inputs.nodos_sdk_version }}" -y --name nodos
          Copy-Item -Path "${{ env.SYSTEM_NOSMAN_PATH }}" -Destination "./${{ env.NOSMAN_EXECUTABLE_NAME }}" -Force
          if (-not $IsWindows) { & chmod +x "./${{ env.NOSMAN_EXECUTABLE_NAME }}" }
          Write-Host "Workspace nosman version:"
          ./${{ env.NOSMAN_EXECUTABLE_NAME }} --version
          Pop-Location
        shell: pwsh
        working-directory: packages-${{ env.SAFE_REF }}

      - name: Checkout
        uses: nodos-dev/actions/checkout@main
        with:
          ref: ${{ github.sha }}
          path: packages-${{ env.SAFE_REF }}/workspace/Module/packages-repo
          jobs: 8
          # Full history + tags for changelog generation.
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.email "${{ env.GIT_EMAIL }}"
          git config user.name "${{ env.GH_USERNAME }}"
        working-directory: packages-${{ env.SAFE_REF }}/workspace/Module/packages-repo

      - name: Update Nosman Cache
        shell: pwsh
        run: |
          ./${{ env.NOSMAN_EXECUTABLE_NAME }} rescan --fetch-index
        working-directory: packages-${{ env.SAFE_REF }}/workspace

      - name: Pre-Configure
        shell: pwsh
        run: |
          ${{inputs.pre_config_command}}
        working-directory: packages-${{ env.SAFE_REF }}/workspace/Module/packages-repo

      - name: Publish (If Changed)
        if: ${{ inputs.publish_mode == 'If Changed' }}
        shell: bash
        run: |
          packages_args=()
          if [ -n "${{ inputs.package_names }}" ]; then
            IFS=';' read -ra pkg_array <<< "${{ inputs.package_names }}"
            for pkg in "${pkg_array[@]}"; do
              pkg_trimmed="$(printf '%s' "$pkg" | xargs)"
              if [ -n "$pkg_trimmed" ]; then
                packages_args+=(--packages "$pkg_trimmed")
              fi
            done
          fi

          ../../${{ env.NOSMAN_EXECUTABLE_NAME }} \
            --workspace ../../ \
            publish-batch \
            --directory . \
            "${packages_args[@]}" \
            --version-suffix ".b${{ inputs.build_number }}" \
            --verbose \
            --tag "$SAFE_REF"
        working-directory: packages-${{ env.SAFE_REF }}/workspace/Module/packages-repo

      - name: Publish (Force)
        if: ${{ inputs.publish_mode == 'Force' }}
        shell: bash
        run: |
          packages_args=()
          if [ -n "${{ inputs.package_names }}" ]; then
            IFS=';' read -ra pkg_array <<< "${{ inputs.package_names }}"
            for pkg in "${pkg_array[@]}"; do
              pkg_trimmed="$(printf '%s' "$pkg" | xargs)"
              if [ -n "$pkg_trimmed" ]; then
                packages_args+=(--packages "$pkg_trimmed")
              fi
            done
          fi

          ../../${{ env.NOSMAN_EXECUTABLE_NAME }} \
            --workspace ../../ \
            publish-batch \
            --directory . \
            "${packages_args[@]}" \
            --version-suffix ".b${{ inputs.build_number }}" \
            --verbose \
            --tag "$SAFE_REF" \
            --publish-all
        working-directory: packages-${{ env.SAFE_REF }}/workspace/Module/packages-repo

      - name: Tag
        if: ${{ inputs.publish_mode != 'None' }}
        run: |
          git tag -a "${{ env.TAG_NAME_PREFIX }}-${{ inputs.build_number }}" -m "Build ${{ inputs.ref_name }}-${{ inputs.build_number }}"
          git push origin "${{ env.TAG_NAME_PREFIX }}-${{ inputs.build_number }}"
        working-directory: packages-${{ env.SAFE_REF }}/workspace/Module/packages-repo
