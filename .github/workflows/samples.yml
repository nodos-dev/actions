name: Modules

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
      publish_mode:
        type: string
        description: 'Publish Mode. Options: Publish Contents, None'
        default: 'None'
      nodos_sdk_version:
        description: 'Nodos SDK Version'
        required: false
        default: ''
        type: string
      clean:
        description: 'Clean build'
        required: false
        default: false
        type: boolean
      build_number:
        description: 'Build number'
        required: false
        default: '0'
        type: string
      pre_config_command:
        description: 'Execute a command before configuration steps'
        required: false
        default: ''
        type: string
      linux:
        description: 'Release for Linux'
        required: false
        default: true
        type: boolean
      windows:
        description: 'Release for Windows'
        required: false
        default: true
        type: boolean

jobs:
  prepare-strategy:
    name: Prepare Strategy
    runs-on: self-hosted
    outputs:
      runner-list: ${{ steps.prepare-step.outputs.runner-list }}
      safe-ref: ${{ steps.prepare-step.outputs.safe-ref }}
    steps:
      - name: Prepare Runner List
        id: prepare-step
        shell: bash
        env:
          REF_NAME: ${{ inputs.ref_name }}
        run: |
          runner_list=$(python3 -c "$(curl -fsSL https://raw.githubusercontent.com/nodos-dev/actions/refs/heads/main/scripts/prep_runner_list.py)" \
            --workflow-input-linux ${{ inputs.linux }} \
            --workflow-input-windows ${{ inputs.windows }} \
            --ref-name "$REF_NAME" \
            --event-name "workflow_call")
          echo Runners: $runner_list
          echo "runner-list=$runner_list" >> $GITHUB_OUTPUT
          # Branch names may contain slashes; sanitize for use in paths and tags.
          echo "safe-ref=${REF_NAME//\//-}" >> $GITHUB_OUTPUT

  build:
    strategy:
      matrix:
        runner: ${{ fromJson(needs.prepare-strategy.outputs.runner-list) }}
      fail-fast: false
    name: "${{ inputs.ref_name }} - ${{ inputs.build_number }} (${{ matrix.runner[0] }}) ${{ (inputs.publish_mode != 'None' && ' (Publishing)') || '' }} ${{ (inputs.publish_mode == 'None' && ' (Build Only)') || '' }}"
    needs: prepare-strategy
    runs-on: ${{ matrix.runner }}

    env:
      GH_USERNAME: "nodos-bot"
      GIT_EMAIL: "bot@nodos.dev"
      GH_TOKEN: ${{ secrets.CI_TOKEN }}
      RUST_BACKTRACE: 1
      SAFE_REF: ${{ needs.prepare-strategy.outputs.safe-ref }}

    steps:
      - name: Setup Environment Variables
        run: |
          if [ "${{ matrix.runner[0] }}" == "Linux" ]; then
            echo "SYSTEM_NOSMAN_PATH=~/Tools/nodos/nodos" >> $GITHUB_ENV
            echo "NOSMAN_EXECUTABLE_NAME=nodos" >> $GITHUB_ENV
            echo "TAG_NAME_PREFIX=build.${SAFE_REF}-linux" >> $GITHUB_ENV
          else
            echo "SYSTEM_NOSMAN_PATH=C:/Tools/nodos.exe" >> $GITHUB_ENV
            echo "NOSMAN_EXECUTABLE_NAME=nodos.exe" >> $GITHUB_ENV
            echo "TAG_NAME_PREFIX=build.${SAFE_REF}-windows" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Update Git Credentials
        continue-on-error: true
        shell: bash
        run: |
          git credential-manager github login --username ${{ env.GH_USERNAME }} --token ${{ secrets.CI_TOKEN }} --force

      - name: Clean Build
        shell: pwsh
        if: ${{ inputs.clean }}
        run: |
          if (Test-Path -Path ./samples-${{ env.SAFE_REF }}) { Remove-Item -Path ./samples-${{ env.SAFE_REF }} -Recurse -Force }

      - name: Setup Work Folder
        shell: pwsh
        run: |
          if (-not (Test-Path -Path ./samples-${{ env.SAFE_REF }})) { New-Item -Path ./samples-${{ env.SAFE_REF }} -ItemType Directory -Force }

      - name: Setup Nodos Workspace (Latest)
        if: ${{ inputs.nodos_sdk_version == '' }}
        run: |
          if (-not (Test-Path -Path ./workspace)) {
            ${{ env.SYSTEM_NOSMAN_PATH }} --workspace ./workspace get
          } else {
            cd ./workspace
            ./${{ env.NOSMAN_EXECUTABLE_NAME }} update
            cd ..
          }
        shell: pwsh
        working-directory: samples-${{ env.SAFE_REF }}

      - name: Setup Nodos Workspace (Specific Version)
        if: ${{ inputs.nodos_sdk_version != '' }}
        run: |
          ${{ env.SYSTEM_NOSMAN_PATH }} --workspace ./workspace get --version "${{ inputs.nodos_sdk_version }}" -y --name nodos
        shell: pwsh
        working-directory: samples-${{ env.SAFE_REF }}

      - name: Checkout
        uses: nodos-dev/actions/checkout@main
        with:
          ref: ${{ github.sha }}
          path: samples-${{ env.SAFE_REF }}/workspace/Module/samples-repo
          jobs: 8
          # Full history + tags for changelog generation.
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.email "${{ env.GIT_EMAIL }}"
          git config user.name "${{ env.GH_USERNAME }}"
        working-directory: samples-${{ env.SAFE_REF }}/workspace/Module/samples-repo
  
      - name: Update Nosman Cache
        shell: pwsh
        run: |
          ./${{ env.NOSMAN_EXECUTABLE_NAME }} rescan --fetch-index
        working-directory: samples-${{ env.SAFE_REF }}/workspace

      - name: Pre-Configure
        shell: pwsh
        run: |
          ${{inputs.pre_config_command}}
        working-directory: samples-${{ env.SAFE_REF }}/workspace/Module/samples-repo

      - name: Configure
        shell: pwsh
        run: |
          cmake -S ./Toolchain/CMake -B ../Project -DCMAKE_BUILD_TYPE=Release
        working-directory: samples-${{ env.SAFE_REF }}/workspace

      - name: Build
        shell: pwsh
        run: |
          cmake --build ../Project --config Release -j 8
        working-directory: samples-${{ env.SAFE_REF }}/workspace

      - name: Publish
        if: ${{ inputs.publish_mode != 'None' }}
        shell: bash
        run: |
          ../../${{ env.NOSMAN_EXECUTABLE_NAME }} \
            --workspace ../../ \
            publish --type=generic \
            --path . \
            --version-suffix ".b${{ inputs.build_number }}" \
            --verbose \
            --publisher-name "${{ env.GH_USERNAME }}" \
            --publisher-email "${{ env.GIT_EMAIL }}" \
            --tag "$SAFE_REF"
        working-directory: samples-${{ env.SAFE_REF }}/workspace/Module/samples-repo

      - name: Tag
        if: ${{ inputs.publish_mode != 'None' }}
        run: |
          git tag -a "${{ env.TAG_NAME_PREFIX }}-${{ inputs.build_number }}" -m "Build ${{ inputs.ref_name }}-${{ inputs.build_number }}"
          git push origin "${{ env.TAG_NAME_PREFIX }}-${{ inputs.build_number }}"
        working-directory: samples-${{ env.SAFE_REF }}/workspace/Module/samples-repo
